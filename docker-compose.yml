services:
  api:
    build:
      context: ./backend/ControleGastos.Api
    container_name: controle-gastos-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Cors__AllowedOrigins__0: http://localhost:3000
      Cors__AllowedOrigins__1: http://localhost:5173
    ports:
      - "8080:8080"
    volumes:
      - sqlite_data:/app/data

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: controle-gastos-web
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:80"

  web-dev:
    image: node:20-alpine
    container_name: controle-gastos-web-dev
    profiles:
      - dev
    working_dir: /app
    depends_on:
      api:
        condition: service_started
    environment:
      VITE_API_PROXY_TARGET: http://api:8080
      VITE_HMR_CLIENT_PORT: 5173
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm ci --no-fund --no-audit && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"

volumes:
  sqlite_data:
  frontend_node_modules:
